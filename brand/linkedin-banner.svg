<?xml version="1.0" encoding="UTF-8"?>
<svg width="1584" height="396" viewBox="0 0 1584 396" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1584" y2="396">
      <stop offset="0%" stop-color="#2D2F33"/>
      <stop offset="100%" stop-color="#3D4045"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(58, 141, 255, 0.1)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bgGradient)"/>
  <rect width="1584" height="396" fill="url(#grid)"/>

  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="60" fill="rgba(58, 141, 255, 0.05)"/>
  <circle cx="1450" cy="300" r="80" fill="rgba(58, 141, 255, 0.05)"/>
  <rect x="1350" y="50" width="150" height="150" rx="20" fill="rgba(58, 141, 255, 0.03)" transform="rotate(15 1425 125)"/>

  <!-- Logo on Left (using embedded image reference) -->
  <g transform="translate(80, 130)">
    <!-- Rounded square emblem -->
    <rect x="0" y="0" width="100" height="100" rx="20" stroke="#FAFAFA" stroke-width="8" fill="none"/>

    <!-- SSS Letters Simplified -->
    <text x="50" y="40" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#FAFAFA" text-anchor="middle">S</text>
    <text x="50" y="65" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#FAFAFA" text-anchor="middle">S</text>
    <text x="50" y="90" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#FAFAFA" text-anchor="middle">S</text>
  </g>

  <!-- Company Name -->
  <text x="220" y="165" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#FAFAFA">SILICON STEEL SOFTWARE</text>

  <!-- Tagline on Right -->
  <text x="950" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#FAFAFA">Transforming Enterprises</text>
  <text x="950" y="215" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#FAFAFA">Through AI & Digital Innovation</text>

  <!-- Accent Line -->
  <rect x="950" y="230" width="120" height="4" fill="#3A8DFF" rx="2"/>

  <!-- Keywords/Tags -->
  <g transform="translate(950, 260)">
    <rect x="0" y="0" width="180" height="32" rx="16" fill="rgba(58, 141, 255, 0.15)"/>
    <text x="90" y="21" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#3A8DFF" text-anchor="middle">AI Transformation</text>
  </g>

  <g transform="translate(1145, 260)">
    <rect x="0" y="0" width="160" height="32" rx="16" fill="rgba(58, 141, 255, 0.15)"/>
    <text x="80" y="21" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#3A8DFF" text-anchor="middle">Cloud Excellence</text>
  </g>

  <g transform="translate(1320, 260)">
    <rect x="0" y="0" width="180" height="32" rx="16" fill="rgba(58, 141, 255, 0.15)"/>
    <text x="90" y="21" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#3A8DFF" text-anchor="middle">Innovation Strategy</text>
  </g>
</svg>
